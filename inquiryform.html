<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="自家焙煎コーヒー記録管理アプリへのお問い合わせフォーム">
<title>お問い合わせ | 自家焙煎コーヒー記録管理</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --color-primary: #8B7355;
  --color-coffee-darkest: #3E2C1F;
  --color-coffee-dark: #5D4434;
  --color-coffee-medium: #7D5E4A;
  --color-coffee-light: #A8927B;
  --color-cream: #FFF9F0;
  --color-latte: #EBE0D3;
  --color-latte-light: #F5EFE5;
  --color-bg: #F5EFE5;
  --color-bg-secondary: #FFF9F0;
  --color-separator: rgba(93, 68, 52, 0.15);
  --color-text-primary: #3E2C1F;
  --color-text-secondary: #5D4434;
  --color-text-tertiary: rgba(93, 68, 52, 0.5);
  --shadow-sm: 0 1px 2px rgba(62, 44, 31, 0.08);
  --shadow-md: 0 2px 8px rgba(62, 44, 31, 0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
  background: var(--color-bg);
  color: var(--color-text-primary);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ナビゲーションバー */
.nav-bar {
  position: sticky;
  top: 0;
  background: var(--color-latte);
  border-bottom: 0.5px solid var(--color-separator);
  padding: var(--spacing-md);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.nav-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-brand {
  flex: 1;
  text-align: center;
}

.nav-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-coffee-dark);
  margin-bottom: 2px;
  letter-spacing: 1px;
}

.nav-subtitle {
  font-size: 11px;
  color: var(--color-coffee-medium);
  font-weight: 600;
  letter-spacing: 1.5px;
}

.nav-spacer {
  width: 38px;
}

/* ハンバーガーメニュー */
.menu-toggle {
  display: flex;
  flex-direction: column;
  cursor: pointer;
  gap: 4px;
  z-index: 1001;
  padding: 8px;
}

.menu-toggle span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--color-coffee-dark);
  transition: 0.3s;
  border-radius: 2px;
}

.menu-toggle.open span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.menu-toggle.open span:nth-child(2) {
  opacity: 0;
}

.menu-toggle.open span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

/* サイドメニュー */
.side-menu {
  position: fixed;
  top: 0;
  right: 0;
  width: 250px;
  height: 100%;
  background: var(--color-bg-secondary);
  box-shadow: -2px 0 8px rgba(62, 44, 31, 0.2);
  display: flex;
  flex-direction: column;
  padding: 60px 20px 20px;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.side-menu.active {
  transform: translateX(0);
}

.side-menu-close {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 32px;
  color: var(--color-coffee-dark);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  line-height: 1;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.side-menu-close:hover {
  color: var(--color-primary);
}

.side-menu a {
  color: var(--color-coffee-dark);
  text-align: left;
  font-size: 16px;
  text-decoration: none;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--color-separator);
  font-weight: 500;
}

.side-menu a:hover {
  color: var(--color-primary);
}

/* メニュー背景オーバーレイ */
.menu-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(62, 44, 31, 0.4);
  z-index: 999;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

.menu-overlay.active {
  display: block;
}

/* メインコンテンツ */
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: var(--spacing-lg);
  padding-bottom: 80px;
}

.page-header {
  text-align: center;
  margin-bottom: var(--spacing-xl);
  padding: var(--spacing-xl) 0;
}

.page-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--color-coffee-darkest);
  margin-bottom: var(--spacing-sm);
}

.form-container {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-md);
  padding: var(--spacing-xl);
  box-shadow: var(--shadow-sm);
}

form {
  display: grid;
  gap: var(--spacing-lg);
}

.form-group {
  display: grid;
  gap: var(--spacing-sm);
}

label {
  font-weight: 600;
  color: var(--color-coffee-dark);
  font-size: 15px;
}

input,
textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--color-separator);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: inherit;
  color: var(--color-text-primary);
  background: white;
  transition: border-color 0.2s;
}

input:focus,
textarea:focus {
  outline: none;
  border-color: var(--color-primary);
}

textarea {
  resize: vertical;
  min-height: 150px;
}

button {
  justify-self: center;
  padding: 14px 40px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  background: var(--color-primary);
  color: var(--color-cream);
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

/* フッター */
footer {
  width: 100%;
  text-align: center;
  padding: var(--spacing-lg);
  background: var(--color-latte);
  font-size: 12px;
  color: var(--color-coffee-dark);
  margin-top: var(--spacing-xl);
}

footer a {
  color: var(--color-coffee-medium);
  text-decoration: none;
  font-weight: 500;
  padding: 0 var(--spacing-sm);
}

footer a:hover {
  text-decoration: underline;
}

.footer-links {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--spacing-xs);
}

/* レスポンシブ */
@media (max-width: 768px) {
  .container {
    padding: var(--spacing-md);
  }

  .page-title {
    font-size: 24px;
  }

  .form-container {
    padding: var(--spacing-lg);
  }
}
</style>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body>

<div class="nav-bar">
  <div class="nav-content">
    <div class="nav-spacer"></div>
    <div class="nav-brand">
      <div class="nav-title">自家焙煎コーヒー記録管理</div>
      <div class="nav-subtitle">COFFEE ROASTING LOG</div>
    </div>
    <div class="menu-toggle" id="menuToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

<!-- サイドメニュー -->
<div class="menu-overlay" id="menuOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <button class="side-menu-close" id="menuClose">&times;</button>
  <a href="/">ホーム</a>
  <a href="/howtouse.html">サイトの利用方法</a>
  <a href="/inquiryform.html">お問い合わせ</a>
  <a href="/privacy.html">プライバシーポリシー</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">お問い合わせ</h1>
    <p style="color: var(--color-text-secondary); margin-top: 8px;">ご不明な点やご要望がございましたら、下記フォームよりお気軽にお問い合わせください。</p>
  </div>

  <div class="form-container">
    <form name="contact" method="POST" data-netlify="true">
      <div class="form-group">
        <label for="name">お名前（必須）</label>
        <input name="name" type="text" required />
      </div>
      <div class="form-group">
        <label for="email">メールアドレス（必須）</label>
        <input name="email" type="email" required />
      </div>
      <div class="form-group">
        <label for="content">お問い合わせ内容（必須）</label>
        <textarea name="content" rows="10" required></textarea>
      </div>
      <button type="submit">送信する</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="/">ホーム</a>
    <span>|</span>
    <a href="/howtouse.html">サイトの利用方法</a>
    <span>|</span>
    <a href="/inquiryform.html">お問い合わせ</a>
    <span>|</span>
    <a href="/privacy.html">プライバシーポリシー</a>
  </div>
  <p style="margin-top: 12px;">&copy; 2025 自家焙煎コーヒー記録管理. All rights reserved.</p>
</footer>

<script>
  // ハンバーガーメニュー
  const menuToggle = document.getElementById("menuToggle");
  const sideMenu = document.getElementById("sideMenu");
  const menuClose = document.getElementById("menuClose");
  const menuOverlay = document.getElementById("menuOverlay");

  const openMenu = () => {
    sideMenu.classList.add("active");
    menuToggle.classList.add("open");
    menuOverlay.classList.add("active");
  };

  const closeMenu = () => {
    sideMenu.classList.remove("active");
    menuToggle.classList.remove("open");
    menuOverlay.classList.remove("active");
  };

  menuToggle.addEventListener("click", openMenu);
  menuClose.addEventListener("click", closeMenu);
  menuOverlay.addEventListener("click", closeMenu);
</script>

</body>
</html>
